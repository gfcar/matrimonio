<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tommaso & Janira</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box}

/* BODY */
body{
  font-family: 'Montserrat', sans-serif;
  color: #2d3a2d; /* Verde mirto leggermente più morbido */
  background: #f7f9f7;
  line-height: 1.8; /* Aumentato per eleganza */
  scroll-behavior: smooth;
  font-weight: 300;
}

/* TITOLI */
h1, h2, .nav-logo {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 400;
  font-style: italic; /* Il corsivo in Cormorant è meraviglioso */
  letter-spacing: 1px;
}

/* DECORAZIONE MIRTO */
body::after{
  content:"";
  position:fixed;
  bottom:-40px;
  right:-20px;
  width:260px;
  height:380px;
  background:url("./images/mirto2.png") no-repeat;
  background-size:contain;
  opacity:0.15;
  pointer-events:none;
  z-index:-1;
}

/* MENU */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  height: 70px; /* Leggermente più alto */
  background: rgba(247, 249, 247, 0.9);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  z-index: 2000;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 30px;
  border-bottom: 1px solid rgba(163, 177, 138, 0.1);
}

.nav-logo {
  font-size: 1.8rem;
  color: #243024;
  text-decoration: none;
  font-style: normal; /* Logo dritto */
}

/* Tasto Hamburger */
.menu-toggle {
  display: flex;
  flex-direction: column;
  gap: 6px;
  cursor: pointer;
  z-index: 2100;
}

.menu-toggle span {
  width: 22px;
  height: 1px; /* Più sottile = più elegante */
  background: #bc8a7a;
  transition: 0.3s;
}

/* Pannello Menu Mobile */
.nav-menu {
  position: fixed;
  top: 0;
  right: -100%;
  width: 100%;
  height: 100vh;
  background: #f7f9f7;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 30px;
  transition: 0.6s cubic-bezier(0.77, 0, 0.175, 1);
  z-index: 2050;
}

.nav-menu.active { right: 0; }

.nav-menu a {
  text-decoration: none;
  color: #243024;
  font-size: 1rem;
  text-transform: uppercase;
  letter-spacing: 3px;
  font-weight: 300;
}

/* --- HERO E SEZIONI --- */
header{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:40px 20px 80px;
  margin-top: 60px;
}

header h1{ 
  font-size: 3.5rem; /* Più grande per il Serif */
  color: #243024; 
  font-style: normal;
}

header p{ 
  margin-top: 5px; 
  letter-spacing: 5px; 
  font-size: .75rem; 
  color: #a3b18a; 
  text-transform: uppercase;
}

.countdown{ margin-top:50px; display:flex; gap:20px; }
.countdown div{ text-align:center; font-size: .6rem; color: #bc8a7a; text-transform: uppercase; letter-spacing: 2px; }
.countdown span{ 
  display:block; 
  font-size:2.2rem; 
  font-family: 'Cormorant Garamond', serif; 
  color: #243024; 
  line-height: 1;
  margin-bottom: 5px;
}

section{
  padding:100px 30px;
  max-width:800px;
  margin:40px auto;
  text-align:center;
  background: rgba(255, 255, 255, 0.3); 
  backdrop-filter: blur(15px); 
  border-radius: 2px; /* Angoli netti sono più moderni ed eleganti */
  opacity:0;
  transform:translateY(30px);
  transition: all 1.2s ease-out;
  border: 1px solid rgba(255, 255, 255, 0.5);
}

section.visible{ opacity:1; transform:translateY(0); }

h2{ font-size: 2.8rem; margin-bottom:30px; color: #243024; }

/* Linea sotto il titolo più discreta */
h2::after{ content:""; width:30px; height:1px; background:#bc8a7a; display:block; margin:20px auto 0; opacity: 0.6; }

.button{
  margin-top:40px;
  padding:15px 50px;
  border: 1px solid #bc8a7a;
  background:transparent;
  color: #bc8a7a;
  cursor:pointer;
  transition: all 0.5s;
  text-transform: uppercase;
  letter-spacing: 3px;
  font-size: 0.7rem;
  font-family: 'Montserrat', sans-serif;
}

.button:hover{ background: #bc8a7a; color: #ffffff; letter-spacing: 4px; }

footer{ padding:80px 60px; text-align:center; font-size:.65rem; color: #a3b18a; text-transform: uppercase; letter-spacing: 4px;}

/* DESKTOP STYLES */
@media(min-width: 768px) {
  header h1{ font-size: 5.5rem; }
  .countdown{ gap:60px; }
  .countdown span{ font-size: 3.5rem; }
  section{ padding: 120px 80px; }
}

</style>
</head>
<body>

<nav>
  <a href="#" class="nav-logo">T & J</a>
  <div class="menu-toggle" id="mobile-menu">
    <span></span><span></span><span></span>
  </div>
  <div class="nav-menu" id="nav-links">
    <a href="#programma">Programma</a>
    <a href="#arrivare">Dove</a>
    <a href="#rsvp">RSVP</a>
    <a href="#dormire">Dormire</a>
    <a href="#lista">Regalo</a>
    <a href="#faq">FAQ</a>
  </div>
</nav>

<header>
  <h1>Tommaso & Janira</h1>
  <p>29 Agosto 2026 • Alghero</p>
  <div class="countdown">
    <div><span id="days"></span>Giorni</div>
    <div><span id="hours"></span>Ore</div>
    <div><span id="minutes"></span>Minuti</div>
    <div><span id="seconds"></span>Secondi</div>
  </div>
</header>

<section id="programma">
  <h2>Il Programma</h2>
  <p><strong>Ore 16:00</strong> — Cerimonia presso la Chiesa di San Francesco</p>
  <p><strong>Ore 18:30</strong> — Aperitivo e Ricevimento a Villa Mosca</p>
  <button class="button">Aggiungi al calendario</button>
</section>

<script>
/* Lo script rimane lo stesso del tuo codice precedente */
const menuToggle = document.getElementById('mobile-menu');
const navLinks = document.getElementById('nav-links');
const links = document.querySelectorAll('.nav-menu a');

menuToggle.addEventListener('click', () => {
  menuToggle.classList.toggle('open');
  navLinks.classList.toggle('active');
});

links.forEach(link => {
  link.addEventListener('click', () => {
    menuToggle.classList.remove('open');
    navLinks.classList.remove('active');
  });
});

const sections=document.querySelectorAll('section');
const observer=new IntersectionObserver(entries=>{
  entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('visible'); });
},{threshold:0.1});
sections.forEach(s=>observer.observe(s));

const weddingDate=new Date("August 29, 2026 16:00:00").getTime();
setInterval(()=>{
  const now=new Date().getTime();
  const d=weddingDate-now;
  if(d > 0) {
    document.getElementById("days").innerText=Math.floor(d/(1000*60*60*24));
    document.getElementById("hours").innerText=Math.floor((d/(1000*60*60))%24);
    document.getElementById("minutes").innerText=Math.floor((d/(1000*60))%60);
    document.getElementById("seconds").innerText=Math.floor((d/1000)%60);
  }
},1000);
</script>
</body>
</html>
